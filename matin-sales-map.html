    .btn-primary { background: #c8102e; color: #fff; }
    .btn-primary:hover { background: #a50d25; }
    .btn-secondary { background: #2a3a50; color: #e8eaf0; }
    .btn-secondary:hover { background: #374d68; }
    #map { flex: 1; min-height: 300px; }
    .leaflet-popup-content-wrapper { background: #1a2535; border: 1px solid #c8102e; border-radius: 8px; color: #e8eaf0; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }

    .leaflet-popup-content { margin: 12px 16px; min-width: 200px; }
    .popup-address { font-weight: 700; font-size: 13px; color: #c8102e; margin-bottom: 8px; line-height: 1.3; }
    .popup-address a { color: #c8102e; text-decoration: none; }
    .popup-address a:hover { text-decoration: underline; }
    .popup-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; color: #b0bac8; gap: 12px; }
    .popup-row span:last-child { color: #e8eaf0; font-weight: 600; }

    .popup-brokers strong { color: #e8eaf0; }

// Dropdowns

    sel.appendChild(opt);
  });

// Map
const map = L.map('map').setView([45.35, -122.65], 10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);
const layerGroup = L.layerGroup().addTo(map);

function fmtPrice(p) {
  if (p >= 1000000) return '$' + (p/1000000).toFixed(2).replace(/\.?0+$/, '') + 'M';
  if (p >= 1000) return '$' + (p/1000).toFixed(0) + 'K';
  return '$' + p.toLocaleString();
}
function fmtVolume(t) {
  if (t >= 1000000000) return '$' + (t/1000000000).toFixed(2) + 'B';
  if (t >= 1000000) return '$' + (t/1000000).toFixed(1) + 'M';
  return '$' + t.toLocaleString();
}
function zillow(a) { return 'https://www.zillow.com/homes/' + encodeURIComponent(a) + '_rb/'; }

function renderMarkers(records) {
  layerGroup.clearLayers();
  let total = 0, shown = 0;
  records.forEach(r => {
    total += r.price;
    if (!r.lat || !r.lon) return;
    shown++;
    const icon = L.divIcon({ className: '', html: '<div class="sale-dot"></div>', iconSize: [10,10], iconAnchor: [5,5] });
    const marker = L.marker([r.lat, r.lon], { icon });
    const brokerLine = r.brokers.length > 1
      ? `<div class="popup-brokers">Co-listed: <strong>${r.brokers.join(' &amp; ')}</strong></div>`
      : `<div class="popup-brokers">Broker: <strong>${r.brokers[0]}</strong></div>`;
    marker.bindPopup(`
      <div class="popup-address"><a href="${zillow(r.address)}" target="_blank">📍 ${r.address}</a></div>
      <div class="popup-row"><span>Sale Price</span><span>${fmtPrice(r.price)}</span></div>
      <div class="popup-row"><span>Closing Date</span><span>${r.date}</span></div>
      ${brokerLine}
    `);
    layerGroup.addLayer(marker);
  });
  document.getElementById('stat-showing').textContent = shown.toLocaleString();
  document.getElementById('stat-total').textContent = records.length.toLocaleString();
  document.getElementById('stat-volume').textContent = fmtVolume(total);
}

function applyFilters() {
  const broker = document.getElementById('filter-broker').value;
  const yf = parseInt(document.getElementById('filter-year-from').value) || 0;
  const yt = parseInt(document.getElementById('filter-year-to').value) || 9999;
  const pmin = parseInt(document.getElementById('filter-price-min').value) || 0;
  const pmax = parseInt(document.getElementById('filter-price-max').value) || Infinity;
  renderMarkers(ALL_RECORDS.filter(r =>
    (!broker || r.brokers.includes(broker)) &&
    r.year >= yf && r.year <= yt &&
    r.price >= pmin && r.price <= pmax
  ));
}

function resetFilters() {
  ['filter-broker','filter-year-from','filter-year-to','filter-price-min','filter-price-max'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('search-box').value = '';
  renderMarkers(ALL_RECORDS);
}

// Search
document.getElementById('search-box').addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const q = e.target.value.trim();
  if (!q) return;
  try {
    const res = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(q + ', Oregon')}&key=${API_KEY}`);
    const data = await res.json();
    if (data.results && data.results.length > 0) {
      const loc = data.results[0].geometry.location;
      map.setView([loc.lat, loc.lng], 12);
    }
  } catch(e) { console.error(e); }
});

// Load instantly - no geocoding needed
renderMarkers(ALL_RECORDS);
